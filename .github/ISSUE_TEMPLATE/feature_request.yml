name: Feature Request
description: Suggest a new feature for Fajar Lang
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include syntax examples if applicable.
      placeholder: |
        ```fajar
        // Example of proposed syntax or API
        ```
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Language Feature
        - Type System
        - Effect System
        - Macro System
        - Compile-Time Evaluation
        - ML / Tensor / GPU
        - OS / Embedded / RTOS
        - IoT (WiFi/BLE/MQTT/LoRaWAN)
        - SIMD / Vectorization
        - Async I/O / Networking
        - Concurrency
        - Security Hardening
        - Standard Library
        - Tooling (CLI, LSP, Debugger, Formatter)
        - Package Manager
        - Codegen Backend (Cranelift/LLVM/Wasm)
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important for my use case
        - Blocking my project
    validations:
      required: false
