name: Feature Request
description: Suggest a new feature for Fajar Lang
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include syntax examples if applicable.
      placeholder: |
        ```fajar
        // Example of proposed syntax or API
        ```
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Language Feature
        - Type System
        - ML / Tensor Operations
        - OS / Embedded Support
        - Standard Library
        - Tooling (CLI, LSP, Formatter)
        - Package Manager
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important for my use case
        - Blocking my project
    validations:
      required: false
