name: Bug Report
description: Report a bug in Fajar Lang
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```fajar
        fn main() -> void {
            // code that triggers the bug
        }
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if any.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Fajar Lang is affected?
      options:
        - Lexer / Parser
        - Type Checker / Analyzer
        - Interpreter
        - Bytecode VM
        - Native Codegen (Cranelift)
        - ML Runtime (Tensor/Autograd)
        - OS Runtime (Memory/IRQ/Syscall)
        - Package Manager
        - CLI / REPL
        - LSP / Editor Support
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Fajar Lang Version
      description: Output of `fj --version`
      placeholder: "fj 0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / etc."
    validations:
      required: true
