name: FajarOS Nova

on:
  push:
    branches: [main]
    paths:
      - "examples/fajaros_nova_kernel.fj"
      - "examples/fajaros_nova_kernel"
      - "examples/fajaros_nova_*test*.sh"
      - "src/codegen/cranelift/runtime_bare.rs"
  pull_request:
    paths:
      - "examples/fajaros_nova_kernel.fj"

jobs:
  check-kernel:
    name: Type-Check Kernel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            target
          key: nova-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build fj compiler
        run: cargo build --release
      - name: Type-check kernel (21K lines, 819 functions)
        run: target/release/fj check examples/fajaros_nova_kernel.fj

  qemu-boot:
    name: QEMU Boot Test
    runs-on: ubuntu-24.04
    needs: check-kernel
    steps:
      - uses: actions/checkout@v5

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Verify kernel binary exists
        run: |
          if [ -f examples/fajaros_nova_kernel ]; then
            echo "Kernel binary: $(wc -c < examples/fajaros_nova_kernel) bytes"
          else
            echo "No pre-compiled kernel binary — skipping QEMU boot"
            exit 0
          fi

      - name: Boot kernel in QEMU (10s timeout)
        timeout-minutes: 1
        run: |
          SERIAL_LOG="/tmp/nova_serial.log"
          qemu-system-x86_64 \
            -kernel examples/fajaros_nova_kernel \
            -serial file:$SERIAL_LOG \
            -display none \
            -no-reboot \
            -m 128M &
          QEMU_PID=$!
          sleep 10
          kill $QEMU_PID 2>/dev/null || true
          echo "=== Serial Output ==="
          cat $SERIAL_LOG 2>/dev/null || echo "(no output)"

      - name: Verify boot messages
        run: |
          SERIAL_LOG="/tmp/nova_serial.log"
          if [ ! -f "$SERIAL_LOG" ] || [ ! -s "$SERIAL_LOG" ]; then
            echo "No serial output — boot verification skipped (kernel may need real hardware)"
            exit 0
          fi
          PASS=0
          FAIL=0
          check() {
            if grep -q "$1" "$SERIAL_LOG" 2>/dev/null; then
              echo "  PASS — $2"
              PASS=$((PASS + 1))
            else
              echo "  WARN — $2 (expected: '$1')"
              FAIL=$((FAIL + 1))
            fi
          }
          check "FajarOS" "Boot banner present"
          check "nova>" "Shell prompt reached"
          echo "---"
          echo "Results: $PASS passed, $FAIL warnings"

  source-analysis:
    name: Kernel Source Analysis + Subsystem Tests
    runs-on: ubuntu-24.04
    needs: check-kernel
    steps:
      - uses: actions/checkout@v5

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Kernel statistics
        run: |
          KERNEL="examples/fajaros_nova_kernel.fj"
          echo "Lines: $(wc -l < $KERNEL)"
          echo "Functions: $(grep -c '@kernel fn' $KERNEL)"
          echo "Commands: $(grep -c 'cmd_' $KERNEL)"
          echo "Syscalls: $(grep -c 'syscall' $KERNEL)"
          echo "Modules: $(ls examples/nova/modules/*.fj | wc -l)"

      - name: Run subsystem verification
        run: bash examples/nova/test_qemu.sh --timeout 10 || true

  arm64-cross:
    name: ARM64 Cross-Compilation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            target
          key: nova-arm64-${{ hashFiles('Cargo.lock') }}
      - name: Build fj compiler with native feature
        run: cargo build --features native
      - name: Install ARM64 toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu qemu-system-arm
      - name: Cross-compile ARM64 examples
        run: |
          for f in examples/fajaros_arm64_*.fj; do
            echo "Compiling: $f"
            target/debug/fj build --target aarch64-unknown-none-elf --no-std "$f"
          done
      - name: Verify ARM64 ELF binaries
        run: |
          file examples/fajaros_arm64_boot | grep "ARM aarch64"
          echo "ARM64 cross-compilation verified"
