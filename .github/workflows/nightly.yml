name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_MIN_STACK: "8388608"

jobs:
  nightly-test:
    name: Nightly Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy (nightly)
        run: cargo clippy -- -D warnings

      # NEW-1 class (re-audit 2026-05-07, found missing here by
      # HONEST_AUDIT_V36 follow-up 2026-06-12 after ≥10 consecutive red
      # nightlies): tests/selfhost_phase17_self_compile.rs::fj_binary()
      # hardcodes target/release/fj, but `cargo test` below builds dev
      # profile only — all 4 phase17 tests panic NotFound without this.
      - name: Build release fj binary (required by phase17 self-host tests)
        run: cargo build --release --bin fj

      - name: Run all tests
        run: cargo test --lib --bins --tests --examples

  nightly-fuzz:
    name: Nightly Fuzz (extended)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            fuzz/target
          key: ${{ runner.os }}-nightly-fuzz-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-fuzz
        # Idempotent install + drop --locked (rustix 0.36.5 in cargo-fuzz
        # 0.13.1 lockfile doesn't compile on current nightly). See ci.yml.
        run: command -v cargo-fuzz >/dev/null 2>&1 || cargo install cargo-fuzz

      - name: Fuzz lexer (120s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_lexer -- -max_total_time=120
      - name: Fuzz parser (120s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_parser -- -max_total_time=120
      - name: Fuzz analyzer (120s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_analyzer -- -max_total_time=120
      - name: Fuzz interpreter (120s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_interpreter -- -max_total_time=120
      - name: Fuzz effect (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_effect -- -max_total_time=60
      - name: Fuzz f-string (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_fstring -- -max_total_time=60
      - name: Fuzz REPL (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_repl -- -max_total_time=60
      - name: Fuzz macro (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_macro -- -max_total_time=60
