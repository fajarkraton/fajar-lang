name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-24.04, ext: "" }
          - { target: aarch64-unknown-linux-gnu,  os: ubuntu-24.04, ext: "" }
          - { target: x86_64-apple-darwin,        os: macos-latest,  ext: "" }
          - { target: aarch64-apple-darwin,       os: macos-14,      ext: "" }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest, ext: ".exe" }
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package archive
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NAME="fj-${TAG}-${{ matrix.target }}"
          mkdir -p "${NAME}"
          cp "target/${{ matrix.target }}/release/fj${{ matrix.ext }}" "${NAME}/"
          cp README.md LICENSE* "${NAME}/" 2>/dev/null || true
          if [[ "${{ matrix.ext }}" == ".exe" ]]; then
            7z a "${NAME}.zip" "${NAME}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fj-${{ matrix.target }}
          path: fj-v*.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts/
      - name: Flatten and checksum
        run: |
          cd artifacts
          find . \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS.txt || true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
