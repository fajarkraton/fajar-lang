name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Run tests (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc' || (matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') || (matrix.target == 'x86_64-apple-darwin' && runner.arch == 'X64')
        run: cargo test --all-targets

      - name: Build release binary
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }}
          use-cross: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="fj-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/fj" "${ARCHIVE_NAME}/"
          cp README.md LICENSE* "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $ARCHIVE_NAME = "fj-${TAG}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $ARCHIVE_NAME
          Copy-Item "target/${{ matrix.target }}/release/fj.exe" "$ARCHIVE_NAME/"
          if (Test-Path "README.md") { Copy-Item "README.md" "$ARCHIVE_NAME/" }
          Compress-Archive -Path "$ARCHIVE_NAME/*" -DestinationPath "${ARCHIVE_NAME}.zip"
          echo "ARCHIVE=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fj-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -name "*.tar.gz"

      - name: Generate checksums
        run: |
          cd artifacts
          find . \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  installer:
    name: Generate Installer Script
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate install.sh
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > install.sh << 'INSTALLER'
          #!/usr/bin/env bash
          set -euo pipefail

          REPO="fajar-lang/fajar-lang"
          INSTALL_DIR="${FJ_INSTALL_DIR:-$HOME/.local/bin}"

          # Detect architecture
          ARCH="$(uname -m)"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"

          case "${ARCH}" in
            x86_64|amd64)  ARCH="x86_64" ;;
            aarch64|arm64) ARCH="aarch64" ;;
            *) echo "Error: unsupported architecture: ${ARCH}"; exit 1 ;;
          esac

          case "${OS}" in
            linux)  TARGET="${ARCH}-unknown-linux-gnu" ;;
            darwin) TARGET="${ARCH}-apple-darwin" ;;
            *) echo "Error: unsupported OS: ${OS}"; exit 1 ;;
          esac

          # Get latest release tag if not specified
          VERSION="${FJ_VERSION:-latest}"
          if [ "${VERSION}" = "latest" ]; then
            VERSION="$(curl -s "https://api.github.com/repos/${REPO}/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": "\(.*\)".*/\1/')"
          fi

          ARCHIVE="fj-${VERSION}-${TARGET}.tar.gz"
          URL="https://github.com/${REPO}/releases/download/${VERSION}/${ARCHIVE}"

          echo "Installing Fajar Lang ${VERSION} for ${TARGET}..."
          echo "  Download: ${URL}"
          echo "  Install:  ${INSTALL_DIR}/fj"

          # Download and extract
          TMP="$(mktemp -d)"
          trap 'rm -rf "${TMP}"' EXIT
          curl -fsSL "${URL}" -o "${TMP}/${ARCHIVE}"
          tar xzf "${TMP}/${ARCHIVE}" -C "${TMP}"

          # Install
          mkdir -p "${INSTALL_DIR}"
          cp "${TMP}"/fj-*/fj "${INSTALL_DIR}/fj"
          chmod +x "${INSTALL_DIR}/fj"

          echo ""
          echo "Fajar Lang ${VERSION} installed to ${INSTALL_DIR}/fj"
          if ! echo "${PATH}" | grep -q "${INSTALL_DIR}"; then
            echo ""
            echo "Add to PATH: export PATH=\"${INSTALL_DIR}:\${PATH}\""
          fi
          INSTALLER

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
