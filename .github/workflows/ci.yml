name: CI

on:
  push:
    branches: [main, develop, "feat/*"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_MIN_STACK: "8388608"

jobs:
  check:
    name: Check (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Clippy lints (tests)
        # Per FAJAR_LANG_PERFECTION_PLAN P1.A3 (commit landed 2026-05-02):
        # explicit --tests scope catches lint regressions in tests/*.rs +
        # src/ #[cfg(test)] mods that the default `cargo clippy -- -D warnings`
        # silently passes. Closes a long-standing test-file lint backlog.
        run: cargo clippy --tests -- -D warnings

      - name: Run tests
        run: cargo test --lib --bins --tests --examples

      - name: Run doc tests
        run: cargo test --doc

      - name: Compile benchmarks (no run)
        if: matrix.os == 'ubuntu-24.04' && matrix.rust == 'stable'
        run: cargo bench --no-run

      - name: Error-code coverage audit (P4.C2)
        if: matrix.os == 'ubuntu-24.04' && matrix.rust == 'stable'
        run: python3 scripts/audit_error_codes.py --strict

  # Stress test: run lib tests under thread oversubscription to catch
  # wall-clock timing flakes early. V26 A1.4 prevention measure.
  # Background: tests that assert `elapsed < threshold` on microsecond-scale
  # work are flaky under heavy parallel load because scheduler jitter parks
  # threads for 100s of ms. See commit 13aa9e3 for details.
  flake-stress:
    name: Flake Stress (parallel test load)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-
      - name: Build tests once
        run: cargo test --lib --no-run
      - name: Run lib tests 5x at --test-threads=64
        run: |
          for i in 1 2 3 4 5; do
            echo "=== stress run $i ==="
            cargo test --lib -- --test-threads=64 || exit 1
          done
          echo "All 5 stress runs passed"

  # Feature-gated tests: LLVM, SMT (Z3), C++ FFI (libclang), Python FFI (pyo3)
  features:
    name: Feature Tests (${{ matrix.feature }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Features that need apt/pip system dependencies.
          - feature: llvm
            apt: llvm-18-dev libpolly-18-dev libzstd-dev
            pip: ""
          - feature: smt
            apt: libz3-dev
            pip: ""
          - feature: cpp-ffi
            apt: libclang-dev
            pip: ""
          - feature: python-ffi
            apt: python3-dev
            pip: numpy
          # Pure-Cargo features (no external deps). Per V32 Perfection
          # P3.CI (commit landed 2026-05-02): full matrix coverage so
          # feature-gated test paths can't silently drift.
          - feature: native
            apt: ""
            pip: ""
          - feature: gui
            apt: libxkbcommon-dev libwayland-dev
            pip: ""
          - feature: cuda
            apt: ""
            pip: ""
          - feature: gpu
            apt: ""
            pip: ""
          - feature: vulkan
            apt: ""
            pip: ""
          - feature: tls
            apt: ""
            pip: ""
          - feature: https
            apt: ""
            pip: ""
          - feature: websocket
            apt: ""
            pip: ""
          - feature: mqtt
            apt: ""
            pip: ""
          - feature: ble
            apt: libdbus-1-dev
            pip: ""
          - feature: wasm
            apt: ""
            pip: ""
          - feature: playground-wasm
            apt: ""
            pip: ""
          - feature: freertos
            apt: ""
            pip: ""
          - feature: zephyr
            apt: ""
            pip: ""
          - feature: esp32
            apt: ""
            pip: ""
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - name: Install Python packages
        if: matrix.pip != ''
        run: pip install ${{ matrix.pip }}
      - name: Test with --features ${{ matrix.feature }}
        run: cargo test --lib --features ${{ matrix.feature }}
      - name: Clippy with --features ${{ matrix.feature }}
        run: cargo clippy --features ${{ matrix.feature }} -- -D warnings
      - name: Clippy --tests with --features ${{ matrix.feature }}
        # Per FAJAR_LANG_PERFECTION_PLAN P3.CI — extend feature matrix
        # to also lint test code under each feature. Closes a long-
        # standing gap where feature-gated test paths (cuda/llvm/wasm/
        # playground-wasm) accumulated lint debt invisibly.
        run: cargo clippy --tests --features ${{ matrix.feature }} -- -D warnings

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || true
      - name: Fuzz lexer (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_lexer -- -max_total_time=60
      - name: Fuzz parser (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_parser -- -max_total_time=60
      - name: Fuzz analyzer (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_analyzer -- -max_total_time=60
      - name: Fuzz interpreter (60s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_interpreter -- -max_total_time=60
      - name: Fuzz effect (30s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_effect -- -max_total_time=30
      - name: Fuzz f-string (30s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_fstring -- -max_total_time=30
      - name: Fuzz REPL (30s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_repl -- -max_total_time=30
      - name: Fuzz macro (30s)
        run: cd fuzz && cargo +nightly fuzz run fuzz_macro -- -max_total_time=30

  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true
      - name: Run cargo audit
        # rustls-webpki advisories chained via rumqttc 0.25.1 (latest stable)
        # which pins rustls-webpki 0.102.8. Upstream rumqttc has not yet
        # released a version using rustls-webpki 0.103+. The mqtt feature is
        # OPTIONAL (off by default) so default builds don't compile this
        # code path. Track upstream rumqttc to remove these ignores.
        # The 0.103.x branch was already bumped in Cargo.lock to 0.103.13
        # (>= advisory's required fix version).
        #   RUSTSEC-2026-0049: cert validation issue (existing)
        #   RUSTSEC-2026-0098: name constraints for URI names accepted
        #   RUSTSEC-2026-0099: name constraints for wildcard names accepted
        #   RUSTSEC-2026-0104: reachable panic in CRL parsing
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Run benchmarks
        run: cargo bench --bench interpreter_bench -- --output-format bencher | tee output.txt
      - name: Track benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          fail-on-alert: true
          alert-threshold: "110%"
          comment-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    env:
      RUST_MIN_STACK: "8388608"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-
      - name: Install cargo-tarpaulin
        # Idempotent install: skip if cache restored a working binary
        # (the `Cache cargo registry and build` step above includes
        # `~/.cargo/bin`). Without the guard, `cargo install` exits 101
        # with "binary already exists in destination" — see CI run
        # 24936960952 + 24869110898 + 24855252863.
        run: command -v cargo-tarpaulin >/dev/null 2>&1 || cargo install cargo-tarpaulin --locked
      - name: Generate coverage
        run: cargo tarpaulin --out xml --output-dir coverage/ --skip-clean --timeout 300
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

  # V27.5 P5.2: regression gate for compiler prep features.
  # Runs V27.5 integration test suite + bare-metal codegen tests.
  # Ensures P1-P4 features (AI scheduler, framebuffer, @app/@host,
  # refinement params, Cap<T>) stay working for V28-V33 consumers.
  v27_5_regression:
    name: V27.5 Compiler Prep Regression
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-v27_5-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-v27_5-
      - name: V27.5 integration tests
        run: cargo test --test v27_5_compiler_prep -- --test-threads=1
      - name: Bare-metal codegen tests (interrupt wrappers + framebuffer)
        run: cargo test --lib --features native -- interrupt_wrapper target_dispatcher bare_fb
      - name: Refinement + capability unit tests
        run: cargo test --lib -- refinement cap_
      - name: Version sync check
        run: bash scripts/check_version_sync.sh
