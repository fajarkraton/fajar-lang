name: Embedded CI

on:
  push:
    branches: [main, master, "phase-*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: "8388608"

jobs:
  native-codegen:
    name: Native Codegen Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-native-

      # NEW-1 fix (re-audit 2026-05-07): the phase17 self-host tests
      # in tests/selfhost_phase17_self_compile.rs::fj_binary() hardcode
      # `target/release/fj`. Without an explicit release build, cargo
      # test (dev profile) leaves that path empty and the tests panic
      # with `NotFound`. See docs/RE_AUDIT_2026_05_07.md NEW-1.
      - name: Build release fj binary (required by phase17 self-host tests)
        run: cargo build --release --bin fj

      - name: Run native codegen tests (JIT + AOT)
        run: cargo test --features native

      - name: Clippy (with native feature)
        run: cargo clippy --features native -- -D warnings

  cross-compilation:
    name: Cross-Compilation + QEMU (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, riscv64]
        include:
          - arch: aarch64
            gcc: gcc-aarch64-linux-gnu
            qemu: qemu-user
          - arch: riscv64
            gcc: gcc-riscv64-linux-gnu
            qemu: qemu-user

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compiler and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.gcc }} ${{ matrix.qemu }}

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cross-${{ matrix.arch }}-

      - name: Run cross-compilation tests (${{ matrix.arch }})
        run: cargo test --features native --test cross_compile_tests -- --nocapture

      - name: Run ${{ matrix.arch }} object generation tests
        run: cargo test --features native -- ${{ matrix.arch }} --nocapture
