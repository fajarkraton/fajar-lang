# Cross-compilation configuration for Fajar Lang
# Usage: cargo build --release --target aarch64-unknown-linux-gnu

# Increase test thread stack size to 16MB (matches main.rs stack_size).
# Arc<Mutex> env guards need more stack per frame than Rc<RefCell>.
[env]
RUST_MIN_STACK = "16777216"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.riscv64gc-unknown-linux-gnu]
linker = "riscv64-linux-gnu-gcc"
